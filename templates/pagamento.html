<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pagamento - APEX</title>
    <style>
        body { background:#0D0D0D; color:#FFFFFF; font-family:'Roboto', sans-serif; text-align:center; padding:50px; }
        select, button { padding:10px; margin:10px; border-radius:5px; border:none; }
        button { background:#D4AF37; color:#0D0D0D; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <h1>Upgrade de Plano</h1>
    <form method="POST">
        <select name="plano" required>
            <option value="" disabled selected>Escolha seu plano</option>
            <option value="Intermediário">CÓDIGO ASCENSÃO</option>
            <option value="Premium">PROTOCOLO VÉRTICE</option>
        </select><br>
        <button type="submit">Atualizar Plano</button>
    </form>
    <a href="/dashboard" style="color:#D4AF37;">Voltar ao Dashboard</a>
</body>
</html>
