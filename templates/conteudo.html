<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conteúdo - APEX</title>

        body { background:#0D0D0D; color:#FFFFFF; font-family:'Roboto', sans-serif; text-align:center; padding:50px; }
        ul { list-style:none; line-height:2; }

</head>
<body>
    <h1>Conteúdo do plano {{plano}}</h1>

    <a href="/dashboard" style="color:#D4AF37;">Voltar ao Dashboard</a>
</body>
</html>
