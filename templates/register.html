<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Registrar - Protocolo Ascensão Silenciosa</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
background:#0D0D0D;
color:#FFF;
font-family:'Roboto',sans-serif;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{
background:#1a1a1a;
padding:40px;
border-radius:15px;
box-shadow:0 0 20px rgba(212,175,55,0.5);
width:350px;
text-align:center;
}

.register-box h1{
color:#D4AF37;
margin-bottom:20px;
}

.register-box input,
.register-box select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:5px;
}

.register-box button{
width:100%;
padding:12px;
background:#D4AF37;
color:#0D0D0D;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.register-box button:hover{
background:#b9952f;
}

.register-box a{
color:#D4AF37;
text-decoration:none;
display:block;
margin-top:15px;
}

.register-box a:hover{
text-decoration:underline;
}

.error{
color:#FF4C4C;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="register-box">

<h1>Registrar</h1>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" action="/register">

<input type="text" name="nome" placeholder="Nome" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="senha" placeholder="Senha" required>

<select name="plano" required>

<option value="" disabled selected>
Escolha seu plano
</option>

<option value="Projeto Apex">
Projeto Apex - R$10/mês
</option>

<option value="Código Ascensão">
Código Ascensão - R$49,90/mês
</option>

<option value="Protocolo Vértice">
Protocolo Vértice - R$99,90/mês
</option>

</select>

<button type="submit">
Registrar
</button>

</form>

<a href="/login">
Já tem conta? Login
</a>

<a href="/planos">
Ver Planos
</a>

</div>

</body>
</html>
